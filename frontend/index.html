<!doctype html>
<html lang="es" translate="no">
	<head>
		<meta charset="UTF-8" />
		<meta name="google" content="notranslate" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="apple-touch-icon" sizes="180x180" href="/imagenes-de-proyecto/granito-inteligente.png" />
		<meta name="theme-color" content="#102d92" />
		<script>
			(() => {
				try {
					[
						'theme',
						'resolvedTheme',
						'isDark',
						'darkMode',
						'themeMode',
						'cafesmart-theme',
						'appearance',
						'color-mode',
						'cafesmart:theme',
						'cafesmart:resolved-theme',
						'cafesmart:dark-mode',
						'cafesmart:theme-mode',
						'cafesmart:appearance',
					].forEach((key) => localStorage.removeItem(key));
					const preference = localStorage.getItem('cafesmart:theme-preference') || 'system';
					const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
					const resolved = preference === 'dark' || (preference === 'system' && systemDark);
					document.documentElement.classList.toggle('dark', resolved);
					document.documentElement.style.colorScheme = resolved ? 'dark' : 'light';
					document.documentElement.dataset.theme = resolved ? 'dark' : 'light';
					const accessibilityRaw = localStorage.getItem('cafesmart:accessibility-preferences');
					const accessibility = accessibilityRaw ? JSON.parse(accessibilityRaw) : null;
					document.documentElement.classList.toggle(
						'a11y-screen-reader',
						Boolean(accessibility?.screenReaderMode),
					);
					document.documentElement.classList.toggle(
						'a11y-high-contrast',
						Boolean(accessibility?.highContrast),
					);
					document.documentElement.classList.remove('font-large', 'font-xlarge');
					if (accessibility?.fontScale === 'large') {
						document.documentElement.classList.add('font-large');
					}
					if (accessibility?.fontScale === 'xlarge') {
						document.documentElement.classList.add('font-xlarge');
					}
				} catch {
					document.documentElement.classList.remove('dark');
					document.documentElement.dataset.theme = 'light';
					/* La preferencia visual no debe bloquear la app. */
				}
			})();
		</script>
		<title>Cafe Smart</title>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
